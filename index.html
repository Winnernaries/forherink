<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 ลองเปิดดูนะ 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Mali', cursive;
            background: #fffafa;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            border: 10px solid #ffdbdb;
            box-sizing: border-box;
        }
        .container { text-align: center; padding: 20px; width: 100%; max-width: 400px; z-index: 10; }
        
        /* ปุ่มกด */
        .btn {
            padding: 12px 25px; margin: 10px; border: none; border-radius: 25px;
            cursor: pointer; font-family: 'Mali'; font-size: 1.1rem; transition: 0.3s;
        }
        .btn-yes { background: #ff6b6b; color: white; }
        .btn-no { background: #eee; color: #999; }

        /* การสลับหน้าจอ */
        #letter-screen { display: none; }
        
        /* สไตล์จดหมายและดอกไม้ */
        .envelope-wrapper { position: relative; cursor: pointer; margin-top: 20px; }
        .flower-gif { width: 250px; height: auto; display: none; margin: 20px auto; border-radius: 15px; }
        .show { display: block; animation: zoomIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        /* สไตล์ฝนดอกไม้ */
        .falling-flower {
            position: fixed;
            top: -10px;
            z-index: 999;
            user-select: none;
            cursor: default;
            animation: fall linear infinite;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="intro-screen" class="container">
        <h1>คุณชื่ออิ๊ง<span style="color:#ff6b6b">Ink</span> ใช่รึเปล่าครับ?</h1>
        <div class="btn-group">
            <button class="btn btn-yes" onclick="showLetter()">ใช่ค่ะ</button>
            <button class="btn btn-no" onclick="alert('ไม่ใช่ก็ต้องใช่แล้วแหละครับ')">ไม่ใช่ค่ะ</button>
        </div>
    </div>

    <div id="letter-screen" class="container">
        <p style="margin-bottom: 50px;">ดีเลย มีจดหมายมาส่งให้ครับ ลองกดเปิดดูสิ</p>
        
        <div class="envelope-wrapper" onclick="openEnvelope()">
            <img src="envelope.gif" id="envelope-img" style="width: 200px; height: auto;">
            <img src="flower.gif" id="flower-img" class="flower-gif">
            <div id="message" style="display:none; margin-top: 20px; color: #ff6b6b; font-weight: bold;">
                ตั้งใจทำให้เลย หวังว่าจะชอบนะครับ 🌸
            </div>
        </div>
    </div>

    <script>
        function showLetter() {
            var music = document.getElementById("bgMusic");
            // เพลงเริ่มเล่นทันทีที่กด "ใช่ค่ะ"
            music.play().catch(e => console.log("Audio play deferred"));

            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('letter-screen').style.display = 'block';
        }

        function openEnvelope() {
            // 1. สลับรูปซองเป็นรูปดอกไม้
            document.getElementById('envelope-img').style.display = 'none';
            document.getElementById('flower-img').classList.add('show');
            document.getElementById('message').style.display = 'block';

            // 2. เรียกใช้ฟังก์ชันฝนดอกไม้
            createFlowerShower();
        }

        function createFlowerShower() {
            const flowers = ['🌸', '🌺', '🌹', '✨', '🤍'];
            const count = 40; // จำนวนดอกไม้

            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const f = document.createElement('div');
                    f.className = 'falling-flower';
                    f.innerText = flowers[Math.floor(Math.random() * flowers.length)];
                    f.style.left = Math.random() * 100 + 'vw';
                    f.style.fontSize = Math.random() * 1 + 0.8 + 'rem';
                    f.style.animationDuration = Math.random() * 3 + 2 + 's'; // สุ่มความเร็ว 2-5 วินาที
                    f.style.opacity = Math.random();
                    
                    document.body.appendChild(f);

                    // ลบทิ้งเมื่อหล่นจบหน้าจอ
                    setTimeout(() => { f.remove(); }, 5000);
                }, i * 150);
            }
        }
    </script>

</body>
</html>
